{% extends "auth/auth_base.html" %}
{% block body %}

<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card o-hidden border-0 shadow-lg my-5">
            <div class="card-body p-5 text-center">
                <div class="text-primary" style="font-size: 5rem; font-weight: 700; line-height: 1;">404</div>
                <p class="text-gray-800 mt-3 mb-1" style="font-size: 1.25rem;">Page not found</p>

        </div>
    </div>
</div>

{% endblock %}
