{% extends "auth/auth_base.html" %}
{% block body %}

<div class="row justify-content-center">
    <div class="col-xl-6 col-lg-8 col-md-9">
        <div class="card o-hidden border-0 shadow-lg my-5">
            <div class="card-body p-5">
                <div class="text-center">
                    <h1 class="h4 text-gray-900 mb-2">Forgot your password?</h1>
                    <p class="mb-4 text-muted small">Enter your email address and we'll send you a reset link.</p>
                </div>
                <form class="user" method="POST">
                    {{ form.hidden_tag() }}
                    <div class="form-group">
                        {{ form.email(class="form-control form-control-user", placeholder="Enter your email address...") }}
                    </div>
                    <button type="submit" class="btn btn-primary btn-user btn-block">
                        Send reset link
                    </button>
                </form>
                <hr>
                <div class="text-center">
                    <a class="small" href="/login">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
