<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="">
  <meta name="author" content="">

  <title>KC7 - A Cybersecurity Game
  </title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/kc7-mark.svg') }}">

  <!-- Custom fonts for this template-->
  <link href="{{ url_for('static', filename='css/fontawesome.all.min.css') }}" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

  <!-- Custom styles for this template-->
  <link href="{{ url_for('static', filename='css/sb-admin-2.min.css') }}" rel="stylesheet">

  <!-- KC7 theme refresh (additive overrides; loaded after the base theme) -->
  <link href="{{ url_for('static', filename='css/kc7-custom.css') }}" rel="stylesheet">
  <!-- KC7 optional dark/cyber theme (inert unless body has .theme-cyber) -->
  <link href="{{ url_for('static', filename='css/kc7-dark.css') }}" rel="stylesheet">

   <!-- Bootstrap core JavaScript-->
  <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

  <!-- Core plugin JavaScript-->
  <script src="{{ url_for('static', filename='js/vendor/jquery.easing.min.js') }}"></script>
    
  <!-- Custom scripts for all pages-->
  <script src="{{ url_for('static', filename='js/sb-admin-2.min.js') }}"></script>
  <!-- Page level plugins -->
  <script src="{{ url_for('static', filename='js/vendor/Chart.min.js') }}"></script>
    
  <!-- Page level custom scripts -->
  <script src="{{ url_for('static', filename='js/demo/utils.js') }}"></script>

  <!-- Datatables-->
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/datatables.min.css') }}"/>


  
     
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>

  <script>
      // Display an info toast with no title
    var toastr;
    toastr.options = {
    "closeButton": true,
    "newestOnTop": false,
    "progressBar": true,
    "positionClass": "toast-top-right",
    "preventDuplicates": false,
    "onclick": null,
    "showDuration": "10000",
    "hideDuration": "1000",
    "timeOut": "10000",
    "extendedTimeOut": "1000",
    "showEasing": "swing",
    "hideEasing": "linear",
    "showMethod": "fadeIn",
    "hideMethod": "fadeOut"
  }
  {% for category, message in get_flashed_messages(with_categories=true) %}
      {% if category in ["success", "error", "warning"] %}
          toastr['{{ category }}']('{{ message }}');
      {% else %}
          toastr['info']('{{ message }}');
      {% endif %}
  {% endfor %}

  // Achievement badges: show a rich "Badge unlocked!" toast for each newly-earned badge.
  // Called by the solve / indicator handlers with the response's new_badges array.
  window.BADGE_IMG_BASE = "{{ url_for('static', filename='images/badges/') }}";
  window.showBadgeToasts = function (badges) {
    if (!badges || !badges.length) return;
    badges.forEach(function (b, i) {
      var html = '<div style="display:flex;align-items:center;gap:10px">'
        + '<img src="' + window.BADGE_IMG_BASE + b.icon + '" alt="" style="width:44px;height:44px;flex:0 0 auto">'
        + '<div><div style="font-weight:700">Badge unlocked!</div>'
        + '<div>' + $('<div>').text(b.name).html() + '</div></div></div>';
      setTimeout(function () {
        toastr.success(html, '', { timeOut: 9000, escapeHtml: false, closeButton: true });
      }, i * 600);
    });
  };
  </script>
</head>

<body id="page-top" class="{{ 'theme-cyber' if request.cookies.get('kc7_theme') == 'cyber' else '' }}">

  <!-- Page Wrapper -->
  <div id="wrapper">
    <!-- Insert Side Nav here-->
    {% include "main/sidebar.html" %}
    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
      <!-- Main Content -->
      <div id="content">
       <!-- Insert Top Nav here-->
        {% include "main/navbar.html" %}
        <!-- Begin Page Content -->
        <div class="container">
          {% block body %}{% endblock %}
          <!-- Insert Page Content here-->
        </div>
      <!-- End of Main Content -->
      <!-- Footer here-->
      {% include "main/footer.html" %}
    </div>
    <!-- End of Content Wrapper -->
  </div>
  <!-- End of Page Wrapper -->

  <!-- Scroll to Top Button-->
  <a class="scroll-to-top rounded" href="#page-top">
    <i class="fas fa-angle-up"></i>
  </a>


</body>

</html>
