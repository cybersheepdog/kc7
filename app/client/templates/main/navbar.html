 <!-- Topbar -->
 <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">

    <!-- Sidebar Toggle (Topbar) -->
    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
      <i class="fa fa-bars"></i>
    </button>

    <!-- Topbar Navbar -->
    <ul class="navbar-nav ml-auto">

      {% if current_user.is_authenticated %}
      <div class="topbar-divider d-none d-sm-block"></div>

      <!-- Nav Item - User Information -->
      <li class="nav-item dropdown no-arrow">
        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
          <span class="mr-2 d-none d-lg-inline text-gray-600 small">{{ current_user.username }}</span>
          <img class="img-profile rounded-circle" src="{{ url_for('static', filename='images/user_icons/001-hacker.png') }}" alt="User">
        </a>
        <!-- Dropdown - User Information -->
        <div class="dropdown-menu dropdown-menu-right shadow animated--grow-in" aria-labelledby="userDropdown">
          <div class="dropdown-item text-muted small">
            <i class="fas fa-shield-alt fa-sm fa-fw mr-2 text-gray-400"></i>
            {% for role in current_user.roles %}{{ role.name }}{% endfor %}
          </div>
          <div class="dropdown-item text-muted small">
            <i class="fas fa-users fa-sm fa-fw mr-2 text-gray-400"></i>
            {{ current_user.team.name if current_user.team else '—' }}
          </div>
          <div class="dropdown-divider"></div>
          <a class="dropdown-item" href="/logout">
            <i class="fas fa-sign-out-alt fa-sm fa-fw mr-2 text-gray-400"></i>
            Logout
          </a>
        </div>
      </li>
      {% endif %}

    </ul>

  </nav>
  <!-- End of Topbar -->
